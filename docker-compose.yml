services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data_cache:/app/data_cache
      - ./.env:/app/.env
    environment:
      - VOYAGER_TEST_TIME=${VOYAGER_TEST_TIME:-}
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
