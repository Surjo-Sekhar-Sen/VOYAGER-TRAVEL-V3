services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./data_cache:/app/data_cache
      - ./.env:/app/.env
    environment:
      - VOYAGER_TEST_TIME=${VOYAGER_TEST_TIME:-}
      - OSRM_BASE_URL=http://osrm-car:5000
    depends_on:
      - osrm-car
      - osrm-foot
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  osrm-car:
    image: ghcr.io/project-osrm/osrm-backend:latest
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "if [ ! -f /data/car.osrm ]; then
        wget -O /data/india.osm.pbf https://download.geofabrik.de/asia/india-latest.osm.pbf &&
        osrm-extract -p /opt/car.lua /data/india.osm.pbf &&
        osrm-partition /data/india.osrm &&
        osrm-customize /data/india.osrm;
      fi && osrm-routed --algorithm mld /data/india.osrm --port 5000"
    restart: unless-stopped

  osrm-foot:
    image: ghcr.io/project-osrm/osrm-backend:latest
    ports:
      - "5001:5001"
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "if [ ! -f /data/foot.osrm ]; then
        wget -O /data/india.osm.pbf https://download.geofabrik.de/asia/india-latest.osm.pbf &&
        osrm-extract -p /opt/foot.lua /data/india.osm.pbf &&
        osrm-partition /data/foot.osrm &&
        osrm-customize /data/foot.osrm;
      fi && osrm-routed --algorithm mld /data/foot.osrm --port 5001"
    restart: unless-stopped
