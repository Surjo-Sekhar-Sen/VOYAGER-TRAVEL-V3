<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>WayFinder - Discovery Results</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "inverse-surface": "#2f3131",
                    "tertiary-container": "#680002",
                    "primary-fixed-dim": "#bdc2ff",
                    "primary-fixed": "#e0e0ff",
                    "primary-container": "#1a237e",
                    "secondary-fixed-dim": "#78dc77",
                    "on-tertiary": "#ffffff",
                    "surface-dim": "#dadada",
                    "surface-bright": "#f9f9f9",
                    "on-secondary-fixed-variant": "#005313",
                    "primary": "#000666",
                    "outline": "#767683",
                    "tertiary-fixed": "#ffdad5",
                    "on-tertiary-fixed": "#410001",
                    "on-primary": "#ffffff",
                    "secondary-container": "#91f78e",
                    "on-secondary-fixed": "#002204",
                    "surface-tint": "#4c56af",
                    "surface-container": "#eeeeee",
                    "outline-variant": "#c6c5d4",
                    "on-secondary": "#ffffff",
                    "tertiary": "#400001",
                    "on-tertiary-fixed-variant": "#930005",
                    "surface-container-high": "#e8e8e8",
                    "on-background": "#1a1c1c",
                    "on-secondary-container": "#00731e",
                    "secondary-fixed": "#94f990",
                    "on-primary-fixed": "#000767",
                    "on-primary-fixed-variant": "#343d96",
                    "on-tertiary-container": "#ff6555",
                    "secondary": "#006e1c",
                    "inverse-on-surface": "#f1f1f1",
                    "surface-variant": "#e2e2e2",
                    "surface-container-lowest": "#ffffff",
                    "tertiary-fixed-dim": "#ffb4a9",
                    "on-primary-container": "#8690ee",
                    "surface-container-low": "#f3f3f3",
                    "inverse-primary": "#bdc2ff",
                    "background": "#f9f9f9",
                    "error": "#ba1a1a",
                    "surface": "#f9f9f9",
                    "on-error-container": "#93000a",
                    "surface-container-highest": "#e2e2e2",
                    "on-surface": "#1a1c1c",
                    "on-error": "#ffffff",
                    "on-surface-variant": "#454652",
                    "error-container": "#ffdad6"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "margin-desktop": "32px",
                    "stack-lg": "24px",
                    "stack-md": "16px",
                    "stack-sm": "8px",
                    "margin-mobile": "16px",
                    "unit": "4px",
                    "gutter": "16px"
            },
            "fontFamily": {
                    "headline-lg-mobile": ["Inter"],
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "headline-md": ["Inter"],
                    "label-md": ["Inter"],
                    "label-sm": ["Inter"],
                    "headline-lg": ["Inter"]
            },
            "fontSize": {
                    "headline-lg-mobile": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                    "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                    "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                    "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                    "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}]
            }
          }
        }
      }
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-left: 1px solid rgba(198, 197, 212, 0.3);
            box-shadow: -4px 0 30px rgba(0, 6, 102, 0.05);
        }
        .glow-green {
            box-shadow: 0 0 20px rgba(145, 247, 142, 0.2);
        }
        .glow-red {
            box-shadow: 0 0 20px rgba(186, 26, 26, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background h-screen overflow-hidden flex font-sans">
<!-- Top App Bar - Web Hidden, Mobile Visible (Suppressed for Context) -->
<!-- Navigation Drawer - Suppressed to prioritize Discovery Panel canvas -->
<!-- Main Content Area -->
<main class="flex-1 relative w-full h-full flex">
<!-- Faded Map View (Left Side) -->
<div class="flex-1 relative bg-surface-container opacity-60 transition-opacity duration-300 hover:opacity-80" data-location="New Delhi" style="">
<img class="absolute inset-0 w-full h-full object-cover" data-alt="A high-fidelity, realistic satellite map view of a bustling urban city center, subtly faded to serve as a background layer. The map shows intricate road networks, green parks, and building footprints in a light mode aesthetic with soft whites, pale grays, and muted greens. Professional and clean transit style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-0GCJVZpxk_cbKtAUEGVaymsE2o5Rb2xi_VBlhV_l1HUVNWfmqyMSLo8TdRaYsg4ex12-_hTHfn4ceFrvkX68R0fvaecj-XYnefuB-O8sRk7ykcz80jVI-f1s0SohNhWgLTpetskPr4AfeKbgYcRNWIdScZb5yNmAHsnU1neXrQMteYbOMGwa4ODDWeBevM6asNZNLDtoFfcpOGOzRR2VjUVlEnWN2PxYObaPRW5a9LEaxrJG2EUQxU9Mzu__VpO277CIDMTAufDj"/>
<!-- Map Overlay UI (Optional context) -->
<div class="absolute top-margin-desktop left-margin-desktop z-10">
<button class="bg-surface/80 backdrop-blur-md rounded-full p-2 shadow-sm border border-outline-variant/30 text-on-surface hover:bg-surface-variant transition-colors">
<span class="material-symbols-outlined" data-icon="my_location" data-weight="fill" style="font-variation-settings: 'FILL' 1;">my_location</span>
</button>
</div>
<!-- Floating Search Bar -->
<div class="absolute top-margin-desktop left-1/2 -translate-x-1/2 z-10 w-[90%] max-w-md hidden md:flex">
<div class="w-full bg-surface/80 backdrop-blur-xl border border-outline-variant/30 rounded-full shadow-sm flex items-center px-4 py-3 h-12">
<span class="material-symbols-outlined text-outline mr-3" data-icon="search">search</span>
<input class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface font-body-md placeholder-outline p-0 outline-none" placeholder="Search destination..." type="text"/>
<span class="material-symbols-outlined text-outline ml-3" data-icon="mic">mic</span>
</div>
</div>
<!-- Active Map Marker Example -->
<div class="absolute top-1/2 left-1/3 -translate-x-1/2 -translate-y-1/2 z-20 flex flex-col items-center">
<div class="relative group cursor-pointer transform hover:scale-115 transition-transform duration-200">
<div class="absolute -inset-4 bg-primary/20 rounded-full animate-pulse"></div>
<div class="w-8 h-8 bg-primary rounded-full flex items-center justify-center shadow-lg border-2 border-surface relative z-10">
<span class="material-symbols-outlined text-on-primary text-[18px]" data-icon="location_on" data-weight="fill" style="font-variation-settings: 'FILL' 1;">location_on</span>
</div>
</div>
</div>
</div>
<!-- Right Side Panel - Discovery Results (3/4 width on mobile, fixed 400px on desktop) -->
<aside class="w-full md:w-[400px] h-full glass-panel flex flex-col z-30 absolute right-0 md:relative transform transition-transform duration-300">
<!-- Panel Header -->
<header class="p-stack-lg border-b border-outline-variant/20 flex justify-between items-center sticky top-0 bg-surface/40 backdrop-blur-md z-10">
<div class="flex items-center gap-stack-sm">
<button class="md:hidden text-on-surface-variant hover:text-on-surface transition-colors p-1 -ml-1">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h2 class="font-headline-md text-headline-md text-on-surface">Discovery results</h2>
</div>
<div class="flex gap-2">
<button aria-label="Filter" class="p-2 rounded-full hover:bg-surface-variant/50 text-on-surface-variant transition-colors">
<span class="material-symbols-outlined text-[20px]" data-icon="tune">tune</span>
</button>
</div>
</header>
<!-- Panel Content (Scrollable) -->
<div class="flex-1 overflow-y-auto p-stack-lg flex flex-col gap-stack-lg">
<!-- Result Card 1: Green Hotel (Positive Context) -->
<article class="bg-surface rounded-xl border border-outline-variant/20 shadow-sm p-stack-md flex flex-col gap-stack-sm glow-green transition-transform duration-200 hover:-translate-y-1 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-secondary-container/10 to-transparent pointer-events-none"></div>
<div class="flex justify-between items-start relative z-10">
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Green Hotel</h3>
<div class="flex items-center gap-2 mt-1">
<div class="flex items-center text-secondary">
<span class="material-symbols-outlined text-[16px]" data-icon="star" data-weight="fill" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-md text-label-md ml-1">4.5</span>
</div>
<span class="text-outline-variant text-[10px]">•</span>
<span class="font-body-md text-body-md text-on-surface-variant">₹2500/night</span>
</div>
</div>
<!-- Reliability Badge (Positive) -->
<div class="flex items-center gap-1 bg-secondary-container/20 border border-secondary/20 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-secondary text-[14px]" data-icon="verified_user">verified_user</span>
<span class="font-label-md text-label-md text-secondary">92%</span>
</div>
</div>
<!-- AI Summary Bento Box -->
<div class="bg-surface-container-low rounded-lg p-stack-sm mt-2 border border-outline-variant/10 relative z-10">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-primary text-[18px] mt-0.5" data-icon="auto_awesome">auto_awesome</span>
<div>
<p class="font-body-md text-body-md text-on-surface leading-tight">Reviews suggest it's safe and active. JustDial verified.</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="mt-2 flex gap-stack-sm relative z-10">
<button class="flex-1 bg-primary text-on-primary font-label-md text-label-md py-2.5 rounded-lg hover:bg-primary/90 transition-colors flex items-center justify-center gap-2 shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="directions">directions</span>
                            Navigate
                        </button>
<button class="px-3 border border-outline-variant rounded-lg text-on-surface hover:bg-surface-variant/50 transition-colors flex items-center justify-center">
<span class="material-symbols-outlined text-[18px]" data-icon="bookmark_border">bookmark_border</span>
</button>
</div>
</article>
<!-- Result Card 2: Nearby ATM (Negative Context) -->
<article class="bg-surface rounded-xl border border-outline-variant/20 shadow-sm p-stack-md flex flex-col gap-stack-sm glow-red transition-transform duration-200 hover:-translate-y-1 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-br from-error-container/10 to-transparent pointer-events-none"></div>
<div class="flex justify-between items-start relative z-10">
<div class="flex items-start gap-3">
<div class="w-10 h-10 bg-error-container rounded-full flex items-center justify-center flex-shrink-0 mt-1">
<span class="material-symbols-outlined text-error" data-icon="local_atm" data-weight="fill" style="font-variation-settings: 'FILL' 1;">local_atm</span>
</div>
<div>
<h3 class="font-headline-md text-headline-md text-on-surface">Nearby ATM</h3>
<p class="font-body-md text-body-md text-on-surface-variant mt-0.5">HDFC Bank • 200m</p>
</div>
</div>
<!-- Reliability Badge (Negative) -->
<div class="flex items-center gap-1 bg-error-container/30 border border-error/20 px-2 py-1 rounded-full">
<span class="material-symbols-outlined text-error text-[14px]" data-icon="warning">warning</span>
<span class="font-label-md text-label-md text-error">30%</span>
</div>
</div>
<!-- AI Summary Bento Box -->
<div class="bg-error-container/20 rounded-lg p-stack-sm mt-2 border border-error/10 relative z-10">
<div class="flex items-start gap-stack-sm">
<span class="material-symbols-outlined text-error text-[18px] mt-0.5" data-icon="info">info</span>
<div>
<p class="font-body-md text-body-md text-on-surface leading-tight">Recent reviews say it's out of cash. Not recommended.</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="mt-2 flex gap-stack-sm relative z-10">
<button class="flex-1 bg-surface-variant text-on-surface-variant font-label-md text-label-md py-2.5 rounded-lg hover:bg-surface-variant/80 transition-colors flex items-center justify-center gap-2" disabled="">
<span class="material-symbols-outlined text-[18px]" data-icon="directions_off">directions_off</span>
                            Alternative Route
                        </button>
</div>
</article>
<!-- Loading Skeleton / More Content Placeholder -->
<div class="p-4 border border-outline-variant/10 rounded-xl bg-surface-container-lowest/50 flex flex-col gap-3 animate-pulse opacity-50">
<div class="h-5 bg-surface-variant rounded w-1/3"></div>
<div class="h-16 bg-surface-variant rounded-lg w-full"></div>
</div>
</div>
</aside>
</main>
<!-- BottomNavBar - Suppressed because we are in a focused Discovery task view, prioritizing the panel canvas -->
</body></html>
