<!DOCTYPE html>

<html lang="en"><head>

                        "label-sm": ["Inter", "sans-serif"],
                        "headline-lg": ["Inter", "sans-serif"]

                    "fontSize": {

                    }
                }
            }
        }
    </script>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        .glass-panel {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        
        .pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background w-full h-screen overflow-hidden relative antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- Map Canvas Background -->
<div class="absolute inset-0 w-full h-full bg-surface-variant z-0" data-alt="A highly detailed, realistic top-down map interface in light mode. The map shows urban streets, green parks, and building footprints in soft whites, light grays, and pale greens. A prominent, glowing blue route line traces a path through the streets, indicating an active navigation segment. The lighting is clean and modern, evoking a premium digital concierge experience." data-location="Bengaluru" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDK4v7W38Aor5HuD7WLGCGNJU_a9pdELJa2lh_TwntrfSS-ija1zE0TVmKnvzGSACnQaqpIWyY-ptj00ynEwpVn2sIRx6KiGswNxXmK3d72t_TAjUljBSgJYvEtJvN3XsQ2nSemXZLrCgFw93s8kU6CVeUGiX7rUNBl0Rk6fGL_nDtErxWXCvX9iIGldJEOViru2_lvbO8-RgeEKZatV5Hb_LOAbB4glZ31Ff7wtaW4yhJh2QgDtbb3lGiJo_jO63PcqLt__tT8wdIp'); background-size: cover; background-position: center;">
<!-- Simulated Active Route SVG Overlay -->
<svg class="absolute inset-0 w-full h-full pointer-events-none" preserveaspectratio="xMidYMid slice" viewbox="0 0 1000 1000">
<path class="opacity-80" d="M400,600 Q450,550 500,600 T600,450" fill="none" stroke="#000666" stroke-dasharray="12,12" stroke-linecap="round" stroke-linejoin="round" stroke-width="8">
<animate attributename="stroke-dashoffset" dur="2s" from="48" repeatcount="indefinite" to="0"></animate>
</path>
<!-- Start Pin -->
<g transform="translate(400,600)">
<circle class="pulse-ring" cx="0" cy="0" fill="rgba(0, 6, 102, 0.2)" r="16"></circle>
<circle cx="0" cy="0" fill="#000666" r="8" stroke="#ffffff" stroke-width="2"></circle>
</g>
<!-- End Pin (Segment 1) -->
<g transform="translate(600,450)">
<circle cx="0" cy="0" fill="#ffffff" r="8" stroke="#000666" stroke-width="3"></circle>
<circle cx="0" cy="0" fill="#000666" r="3"></circle>
</g>
</svg>
</div>
<!-- Contextual Top App Bar (Modified for Transactional Flow) -->
<!-- Suppressed standard navigation logic (no menu/avatar) per "Linear/Transactional" rule -->
<header class="fixed top-0 w-full z-50 flex items-center justify-between px-margin-mobile py-stack-sm md:px-margin-desktop glass-panel bg-surface/80 dark:bg-inverse-surface/80 border-b border-outline-variant/30 shadow-sm transition-all">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-variant/50 transition-colors text-primary active:scale-95">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<div class="flex-1 flex justify-center">
<h1 class="font-headline-md text-headline-md text-primary font-bold tracking-tight">WayFinder</h1>
</div>
<div class="w-10"></div> <!-- Spacer for alignment -->
</header>
<!-- Floating Segment Indicator -->
<div class="absolute top-[80px] left-0 right-0 z-40 flex justify-center pointer-events-none">
<div class="bg-surface-container-highest/90 glass-panel border border-outline-variant/30 shadow-md rounded-full px-4 py-1.5 flex items-center gap-2">
<span class="material-symbols-outlined text-[16px] text-primary">route</span>
<span class="font-label-md text-label-md text-on-surface">Segment 1 of 3</span>
</div>
</div>
<!-- Selection Panel (Bottom Sheet on Mobile, Side Panel on Desktop) -->
<main class="absolute bottom-0 w-full md:w-[420px] md:top-24 md:bottom-margin-desktop md:left-margin-desktop bg-surface/95 glass-panel rounded-t-3xl md:rounded-2xl border-t md:border border-outline-variant/30 shadow-[0_-8px_30px_rgb(0,6,102,0.1)] z-40 flex flex-col overflow-hidden transition-transform duration-300 transform-gpu">
<!-- Mobile Drag Handle -->
<div class="w-full flex justify-center pt-3 pb-1 md:hidden">
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full"></div>
</div>
<div class="flex-1 overflow-y-auto px-margin-mobile md:px-stack-lg pb-stack-lg pt-stack-sm custom-scrollbar">
<!-- Segment Header -->
<div class="mb-stack-lg pt-2">
<div class="flex items-center gap-3">
<div class="flex flex-col items-center">
<div class="w-3 h-3 rounded-full border-2 border-primary bg-surface"></div>
<div class="w-0.5 h-6 bg-outline-variant/50 my-1"></div>
<div class="w-3 h-3 rounded-full bg-primary relative">
<div class="absolute inset-0 bg-primary rounded-full animate-ping opacity-40"></div>
</div>
</div>
<div class="flex flex-col flex-1 pb-1">
<div class="h-8 flex items-center">
<span class="font-body-md text-body-md text-on-surface-variant">Current Location</span>
</div>
<div class="h-8 flex items-center">
<span class="font-headline-md text-headline-md text-on-surface font-semibold truncate">Puttenahalli</span>
</div>
</div>
</div>
</div>
<div class="w-full h-px bg-outline-variant/20 mb-stack-lg"></div>
<!-- Options Title -->
<h2 class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider mb-stack-md">Select Transit Mode</h2>
<!-- Cards Container -->
<div class="flex flex-col gap-stack-md">
<!-- Card 1: Recommended (Auto) -->
<label class="relative block cursor-pointer group">
<input checked="" class="peer sr-only" name="transit_mode" type="radio"/>
<div class="bg-surface-container-lowest border-2 border-primary rounded-xl p-4 flex items-center justify-between shadow-[0_4px_20px_rgba(0,6,102,0.1)] peer-checked:bg-primary/5 transition-all">
<!-- Recommended Badge -->
<div class="absolute -top-3 left-4 bg-primary text-on-primary px-3 py-0.5 rounded-full font-label-sm text-label-sm flex items-center gap-1 shadow-sm">
<span class="material-symbols-outlined text-[12px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                            Recommended
                        </div>
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[24px]">local_taxi</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Auto/Rapido</span>
<span class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[14px]">schedule</span> 5 mins
                                </span>
</div>
</div>
<div class="text-right">
<div class="font-headline-md text-headline-md text-primary font-bold">₹45</div>
<div class="w-5 h-5 rounded-full border-2 border-primary flex items-center justify-center mt-1 ml-auto">
<div class="w-2.5 h-2.5 bg-primary rounded-full"></div>
</div>
</div>
</div>
</label>
<!-- Card 2: Walk -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="transit_mode" type="radio"/>
<div class="bg-surface-container border border-outline-variant/40 rounded-xl p-4 flex items-center justify-between hover:border-primary/50 peer-checked:border-primary peer-checked:border-2 peer-checked:bg-primary/5 transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high text-on-surface flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-[24px]">directions_walk</span>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">Walk</span>
<span class="font-body-md text-body-md text-on-surface-variant flex items-center gap-2">
<span class="flex items-center gap-0.5"><span class="material-symbols-outlined text-[14px]">schedule</span> 15 mins</span>
<span class="w-1 h-1 rounded-full bg-outline"></span>
<span>1.2 km</span>
</span>
</div>
</div>
<div class="text-right">
<div class="font-headline-md text-headline-md text-on-surface font-semibold">₹0</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mt-1 ml-auto peer-checked:border-primary"></div>
</div>
</div>
</label>
<!-- Card 3: Bus -->
<label class="relative block cursor-pointer group">
<input class="peer sr-only" name="transit_mode" type="radio"/>
<div class="bg-surface-container border border-outline-variant/40 rounded-xl p-4 flex items-center justify-between hover:border-primary/50 peer-checked:border-primary peer-checked:border-2 peer-checked:bg-primary/5 transition-all">
<div class="flex items-center gap-4">
<div class="w-12 h-12 rounded-full bg-surface-container-high text-on-surface flex items-center justify-center shrink-0 relative overflow-hidden">
<span class="material-symbols-outlined text-[24px]">directions_bus</span>
<!-- Metro Line Color Bar Simulator -->
<div class="absolute bottom-0 w-full h-1 bg-surface-tint"></div>
</div>
<div class="flex flex-col">
<span class="font-headline-md text-headline-md text-on-surface">BMTC 507-D</span>
<span class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<div class="w-2 h-2 rounded-full bg-secondary shadow-[0_0_8px_rgba(0,110,28,0.6)] animate-pulse"></div>
                                    Coming at 12:45 PM
                                </span>
</div>
</div>
<div class="text-right">
<div class="font-headline-md text-headline-md text-on-surface font-semibold">₹15</div>
<div class="w-5 h-5 rounded-full border-2 border-outline-variant mt-1 ml-auto peer-checked:border-primary"></div>
</div>
</div>
</label>
</div>
</div>
<!-- Sticky Bottom Action Area -->
<div class="p-margin-mobile border-t border-outline-variant/20 bg-surface/95 glass-panel z-10">
<button class="w-full bg-primary hover:bg-on-primary-fixed-variant text-on-primary rounded-xl py-4 flex items-center justify-center gap-2 shadow-[0_8px_20px_rgba(0,6,102,0.2)] transition-all active:scale-[0.98]">
<span class="font-label-md text-label-md uppercase tracking-widest font-bold">Next Segment</span>
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">arrow_forward</span>
</button>
</div>
</main>
<style>
        /* Hide scrollbar for cleaner UI in the cards container */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #c6c5d4;
            border-radius: 4px;
        }
    </style>
</body></html>
